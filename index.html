<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LAOSS MA/XRT Scheduling</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="assets/laorthos-logo.png" alt="LA Orthos logo" class="logo" />
      <div>
        <h1>LAOSS MA/XRT Scheduling</h1>
        <p class="sub">Provider-first weekly staffing builder</p>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="btnRefresh" class="btn btn-secondary">Refresh</button>
      <button id="btnSave" class="btn btn-primary">Save Week</button>
    </div>
  </header>

  <main class="page">
    <section class="toolbar card">
      <div class="toolbar-row">
        <div class="field">
          <label for="weekPicker">Week Of</label>
          <input type="date" id="weekPicker" />
        </div>

        <div class="field">
          <label for="providerSearch">Find Provider</label>
          <input type="text" id="providerSearch" placeholder="Search provider..." />
        </div>

        <div class="field">
          <label for="timePresetBuilder">Add Time Preset</label>
          <div class="inline">
            <input type="text" id="timePresetBuilder" placeholder="ex. 9:00am - 5:30pm" />
            <button id="btnAddPreset" class="btn btn-secondary">Add</button>
          </div>
        </div>

        <div class="field">
          <label for="providerCompletionInfo">Provider Status</label>
          <div id="providerCompletionInfo" class="pill">Select a provider</div>
        </div>
      </div>
    </section>

    <section class="layout">
      <aside class="sidebar">
        <div class="card">
          <div class="card-head">
            <h2>Providers</h2>
          </div>
          <div id="providerList" class="provider-list"></div>
        </div>

        <div class="card">
          <div class="card-head">
            <h2>Available Staff</h2>
          </div>

          <div class="staff-section">
            <h3>MAs</h3>
            <div id="maPool" class="staff-pool"></div>
          </div>

          <div class="staff-section">
            <h3>XRT</h3>
            <div id="xrtPool" class="staff-pool"></div>
          </div>

          <div class="staff-section">
            <h3>Float Options</h3>
            <div id="floatPool" class="staff-pool"></div>
          </div>
        </div>
      </aside>

      <section class="content">
        <div class="card">
          <div class="provider-header-main">
            <div>
              <h2 id="selectedProviderName">Select a provider</h2>
              <div id="selectedProviderMeta" class="provider-meta"></div>
            </div>

            <div class="provider-header-actions">
              <button id="btnWeekScheduled" class="btn btn-secondary">Mark Week Scheduled</button>
              <button id="btnWeekOff" class="btn btn-secondary">Mark Week OFF</button>
              <button id="btnWeekPto" class="btn btn-secondary">Mark Week PTO</button>
              <button id="btnWeekHoliday" class="btn btn-secondary">Mark Week Holiday</button>
              <button id="btnWeekAdmin" class="btn btn-secondary">Mark Week Admin</button>
              <button id="btnWeekClear" class="btn btn-secondary">Clear Week</button>
            </div>
          </div>

          <div id="selectedWeekGrid" class="selected-week-grid"></div>
        </div>

        <div class="card review-card">
          <div class="card-head">
            <h2>Weekly Review</h2>
            <div id="saveStatus" class="save-status">Not saved</div>
          </div>
          <div id="reviewGridWrap" class="review-grid-wrap"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="dayModal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <div id="modalDayTitle" class="modal-title">Edit Day</div>
          <div id="modalDaySub" class="modal-sub"></div>
        </div>
        <button id="btnCloseModal" class="icon-btn" type="button" aria-label="Close">✕</button>
      </div>

      <div class="modal-body">
        <div class="modal-grid">
          <div class="field">
            <label for="modalStatus">Day Status</label>
            <select id="modalStatus">
              <option value="Scheduled">Scheduled</option>
              <option value="OFF">OFF</option>
              <option value="PTO">PTO</option>
              <option value="Holiday">Holiday</option>
              <option value="Admin">Admin</option>
              <option value="Call Only">Call Only</option>
            </select>
          </div>

          <div class="field">
            <label for="modalLocation">Primary Location</label>
            <select id="modalLocation"></select>
          </div>

          <div class="field">
            <label for="modalMa">MA</label>
            <select id="modalMa"></select>
          </div>

          <div class="field">
            <label for="modalTime">Shift Time</label>
            <select id="modalTime"></select>
          </div>

          <div class="field">
            <label for="modalXrt">XRT</label>
            <select id="modalXrt"></select>
          </div>

          <div class="field">
            <label for="modalXrRoom">XR Room</label>
            <input type="text" id="modalXrRoom" placeholder="Optional XR room" />
          </div>

          <div class="field field-span-2">
            <label for="modalSecondaryLocation">Secondary Location</label>
            <input type="text" id="modalSecondaryLocation" placeholder="Optional second location" />
          </div>

          <div class="field field-span-2">
            <label for="modalNotes">Notes</label>
            <input type="text" id="modalNotes" placeholder="Optional notes" />
          </div>
        </div>

        <div id="nonScheduledMessage" class="non-scheduled-message hidden">
          This day is not scheduled. Staffing fields are disabled until the status is set back to Scheduled.
        </div>
      </div>

      <div class="modal-foot">
        <button id="btnPrevDay" class="btn btn-secondary">Save & Previous</button>
        <button id="btnNextDay" class="btn btn-secondary">Save & Next</button>
        <button id="btnSaveDay" class="btn btn-primary">Save Day</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
